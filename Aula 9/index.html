<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>

<body>
    <table border="1">
        <thead>
            <tr>
                <th>
                    Nome:
                </th>
                <th>
                    <form action="" method="post">
                        <input type="text" name="usuario" id="idusuario" size="40" maxlength="30"
                            placeholder="Digite seu Nome" required>
                        <label for="idusuario"></label>
                    </form>
                </th>
            </tr>

            <tr>
                <th>
                    E-mail pessoal:
                </th>
                <th>
                    <form action="" method="post"> <input type="text" name="emailpessoal" id="idemailpessoal" size="40"
                            maxlength="40">
                        <label for=""></label>
                    </form>
                </th>
            </tr>
            <tr>
                <th>
                    E-mail(patter):
                </th>
                <th>
                    <form action="" method="post">
                        <input type="text" name="emailpatter" id="idpatter" size="40" maxlength="30"
                            placeholder="Digite seu email com @" required>
                    </form>
                </th>
            </tr>

            <tr>
                <th>
                    Senha:
                </th>

                <th>
                    <form action="" method="post"> <input type="password" id="senha" name="senha" size="40"
                            maxlength="40" required></form>
                </th>
            </tr>
            <tr>
                <th>
                    Idade:
                </th>
                <th>
                    <form action=""><input type="number" required id="Idade" size="10" name="idade" min="1" max="120"></form>
                </th>
            </tr>
            <tr>
                <td colspan="2">Deixe um comentário: <br>

                    <form action=""><textarea name="comentario" id="idcomentario" cols="50" rows="10"
                            placeholder="Escreva aqui um comentário"></textarea></form>
                </td>
            </tr>
            <tr>
                <td> <label for="">Matéria de interesse:</label> <br>
                    <form action=""><input type="checkbox" name="Backend" value="backend"> Backend <br>
                    <input type="checkbox" name="Frontend" value="frontend"> Frontend <br>
                    <input type="checkbox" name="Fullstack" value="fullstack"> fullstack
                    </form>
                </td>
                <td>
                    <form action="">
                        <label for="">Tipo de Viagem:</label> <br>
                        <input type="radio" id="inegocio" name="opcao" value="a"> Negócios <br>

                        <input type="radio" name="opcao" id="ilazer" value="b"> Lazer <br>

                        <input type="radio" name="opcao" id="iturismo" value="c"> Turismo <br>

                        <input type="radio" name="opcao" id="iacademico" value="d"> Acadêmico

                    </form>
                </td>
            </tr>
            <tr>
                <td><label for="">Esporte favorito:</label>
                <select name="esporte" size="3">
                <option value="">Selecione</option>
                <option value="tenis">Tênis</option>
                <option value="volei">Vôlei</option>
                <option value="basquete">Basquete</option>
                <option value="futebol">Futebol</option>
                </select>
            </td>
            <td>
                <label for="">Investimentos:</label>
                <select name="investimento" size="1">
                <option value="">Selecione</option>
                <option value="CDB">CDB</option>
                <option value="CDI">CDI</option>
                <option value="Criptomoeda">Criptomoeda</option>
                <option value="Ações">Ações</option>
                <option value="Tesouro Direto">Tesouro Direto</option>
                <option value="poupanca">Poupança</option>
                <option value="fundoimobiliario">Fundo Imobiliários</option>
                <option value="debentures">Debêntures</option>
                </select>
            </td>
            </tr>
            <tr>
                <td><label for="">Escolha uma cor:</label>
                <input type="color"></td>

                <td><label for="">Selecione um arquivo:</label>
                    <input type="file">
                </td>
            </tr>
            <tr>
                <td colspan="2"><label for="">Data e Hora de envio:</label><input type="datetime-local" name="date" id="idate"></td>
            </tr>
            <tr>
                <td><input type="submit" name="enviar" id="ienviar" value="Enviar"></td>
                <td><input type="reset" value="Limpar"></td>
            </tr>
          


        </thead>

    </table>

</body>

</html>
